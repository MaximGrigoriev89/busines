<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Бизнес Империя</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{
--bg:#0d0f20;--card:#171a33;--card2:#1e2145;--border:#282b50;
--text:#e4e4f0;--dim:#7878a0;--green:#3dd66a;--red:#ff4f5e;
--blue:#4a9eff;--purple:#a840ff;--orange:#ff8c1a;--gold:#ffd700;
}
html{height:100%;overflow:hidden;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);
max-width:430px;margin:0 auto;height:100%;display:flex;flex-direction:column;
position:relative;user-select:none;-webkit-tap-highlight-color:transparent;overflow:hidden;}

/* ---- SCROLLABLE WRAPPER ---- */
.scroll-wrap{flex:1;overflow-y:auto;overflow-x:hidden;min-height:0;
scrollbar-width:none;-ms-overflow-style:none;}
.scroll-wrap::-webkit-scrollbar{display:none;}

/* ---- TOP BAR (fixed) ---- */
.top-bar{display:flex;justify-content:space-between;align-items:center;
padding:8px 12px;background:linear-gradient(180deg,#151730,#0d0f20);
border-bottom:1px solid var(--border);flex-shrink:0;z-index:10;}
.currency{display:flex;align-items:center;gap:5px;font-weight:700;font-size:14px;}
.cur-icon{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;
justify-content:center;font-size:12px;font-weight:900;}
.ci-soft{background:linear-gradient(135deg,#1a6030,#104020);color:#3dd66a;border:1px solid #2a8040;}
.ci-hard{background:linear-gradient(135deg,#5020a0,#301060);color:#c060ff;border:1px solid #7030c0;}
.game-title{font-size:12px;font-weight:800;color:var(--gold);letter-spacing:0.5px;text-shadow:0 0 12px #ffd70044;}

/* ---- MANAGER SECTION ---- */
.mgr-section{padding:6px 8px;background:#101228;border-bottom:1px solid var(--border);}
.mgr-section h3{font-size:9px;color:var(--dim);margin-bottom:4px;text-transform:uppercase;letter-spacing:1.5px;}
.mgr-slots{display:flex;gap:5px;}
.mgr-slot{flex:1;min-height:68px;background:var(--card);border-radius:10px;
display:flex;align-items:center;justify-content:center;border:1px solid var(--border);overflow:hidden;}
.slot-search{background:var(--card);border:1.5px dashed #3a3d68;border-radius:8px;
padding:4px;cursor:pointer;width:100%;height:100%;display:flex;flex-direction:column;
align-items:center;justify-content:center;gap:1px;transition:.15s;}
.slot-search:active{transform:scale(0.94);background:#1a1d40;}
.slot-search .ico{font-size:18px;}
.slot-search .txt{font-size:10px;font-weight:700;color:#8899cc;}
.slot-search .sub{font-size:8px;color:#5566aa;}
.mgr-card-inner{display:flex;align-items:center;width:100%;padding:4px;gap:4px;}
.mgr-portrait{width:40px;height:40px;border-radius:7px;border:2.5px solid #fff;
display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.mgr-right{flex:1;display:flex;flex-direction:column;gap:1px;min-width:0;}
.mgr-rarity-label{font-size:8px;font-weight:800;letter-spacing:0.3px;}
.mgr-stat-label{font-size:7px;color:var(--dim);line-height:1.2;}
.mgr-btns{display:flex;gap:2px;margin-top:2px;}
.mgr-btns button{flex:1;padding:3px 2px;border-radius:5px;border:none;font-size:9px;
font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:1px;}
.mb-hire{background:#153025;color:var(--green);}
.mb-hire:active{background:#204535;}
.mb-fire{background:#301515;color:var(--red);}
.mb-fire:active{background:#452020;}

/* Rarity */
.r-white{border-color:#bbb!important;}.r-green{border-color:#3dd66a!important;}
.r-blue{border-color:#4a9eff!important;}.r-purple{border-color:#a840ff!important;}
.r-orange{border-color:#ff8c1a!important;}
.rbg-white{background:linear-gradient(145deg,#333,#282828)!important;}
.rbg-green{background:linear-gradient(145deg,#143020,#0a2018)!important;}
.rbg-blue{background:linear-gradient(145deg,#142040,#0a1030)!important;}
.rbg-purple{background:linear-gradient(145deg,#201040,#100830)!important;}
.rbg-orange{background:linear-gradient(145deg,#302010,#201008)!important;}

/* ---- TABS ---- */
.tabs{display:flex;background:#0e1025;border-bottom:1px solid var(--border);}
.tab{flex:1;padding:7px 2px;text-align:center;font-size:9px;font-weight:700;
color:var(--dim);cursor:pointer;border-bottom:2.5px solid transparent;transition:.15s;
white-space:nowrap;overflow:hidden;}
.tab.on{color:var(--text);border-bottom-color:var(--blue);}

/* ---- BUSINESS GRID ---- */
.biz-grid{display:flex;flex-direction:column;gap:4px;padding:6px 8px;}
.biz{background:var(--card);border-radius:10px;padding:6px 8px;display:flex;gap:6px;
cursor:pointer;border:1.5px solid var(--border);transition:.12s;position:relative;
min-height:58px;align-items:center;}
.biz:active{transform:scale(0.98);}
.biz.sel{border-color:var(--blue);box-shadow:0 0 12px rgba(74,158,255,0.15);}

.biz-ico{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;
justify-content:center;font-size:22px;flex-shrink:0;background:#1e2148;}

/* Info block — compact when manager present, flex when not */
.biz-mid{display:flex;flex-direction:column;justify-content:center;min-width:0;}
.biz-mid.expand{flex:1;}
.biz-mid.compact{width:80px;flex-shrink:0;}
.biz-cat{font-size:7px;color:var(--dim);text-transform:uppercase;letter-spacing:0.5px;}
.biz-name{font-size:11px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.biz-inc{font-size:10px;color:var(--green);font-weight:700;}
.biz-tier{font-size:8px;color:var(--dim);}

/* Manager portrait — sits in the center of the card */
.biz-mgr-portrait{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;
justify-content:center;font-size:22px;border:2.5px solid #fff;flex-shrink:0;}

/* Manager description — fills right side, larger text */
.biz-mgr-desc{flex:1;display:flex;flex-direction:column;gap:2px;min-width:0;}
.biz-mgr-desc .rname{font-size:10px;font-weight:800;line-height:1.2;}
.biz-mgr-desc .rstat{font-size:9px;font-weight:600;line-height:1.2;}
.biz-mgr-desc .rdesc{font-size:8px;color:var(--dim);line-height:1.25;}
.biz-mgr-desc .rbtn{font-size:8px;padding:3px 8px;border-radius:4px;border:none;
cursor:pointer;font-weight:700;margin-top:2px;display:inline-block;width:fit-content;}

/* Collect ring (no manager) — right side */
.collect-ring{width:42px;height:42px;border-radius:9px;display:flex;align-items:center;
justify-content:center;cursor:pointer;flex-shrink:0;}
.collect-inner{width:30px;height:30px;border-radius:6px;background:var(--bg);
display:flex;align-items:center;justify-content:center;}
.collect-ready{animation:glow 1s infinite alternate;}
@keyframes glow{from{box-shadow:0 0 4px #3dd66a55;}to{box-shadow:0 0 12px #3dd66a;}}

/* ---- DETAIL SECTION ---- */
.detail{padding:8px 10px;background:linear-gradient(180deg,#101228,#0d0f20);
border-top:1px solid var(--border);}
.detail h3{font-size:12px;font-weight:800;margin-bottom:3px;}
.detail .inc{font-size:10px;color:var(--green);font-weight:600;margin-bottom:6px;}
.upg-list{display:flex;flex-direction:column;gap:3px;}
.upg{display:flex;align-items:center;justify-content:space-between;
padding:4px 8px;background:var(--card);border-radius:6px;font-size:11px;}
.upg .chk{width:18px;height:18px;border-radius:4px;border:2px solid #3a3d68;
display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;transition:.2s;}
.upg .chk.on{background:var(--green);border-color:var(--green);color:#000;font-weight:900;}
.act-btn{width:100%;padding:9px;border-radius:8px;border:none;font-size:12px;
font-weight:700;cursor:pointer;margin-top:6px;transition:.1s;}
.act-btn:active{transform:scale(0.97);}
.ab-buy{background:linear-gradient(135deg,#1a5a2a,#104018);color:var(--green);}
.ab-wait{background:#1e2148;color:var(--dim);cursor:default;}
.ab-ad{background:linear-gradient(135deg,#5a3010,#402008);color:var(--orange);}
.ab-expand{background:linear-gradient(135deg,#2a30aa,#1a2080);color:#aabbff;}
.ab-max{background:#1e2148;color:var(--gold);}
.timer-row{font-size:10px;color:var(--dim);margin-top:4px;text-align:center;}

/* ---- GLOBAL SECTION (fixed bottom) ---- */
.global{flex-shrink:0;padding:8px 12px 10px;background:#0a0c1a;border-top:1px solid var(--border);}
.global h3{font-size:9px;color:var(--dim);margin-bottom:5px;text-transform:uppercase;letter-spacing:1.5px;}
.gl-row{display:flex;align-items:center;gap:8px;}
.gl-track{flex:1;height:20px;background:#151730;border-radius:10px;position:relative;overflow:hidden;}
.gl-fill{height:100%;border-radius:10px;transition:width .5s;background:linear-gradient(90deg,#6020c0,#4a9eff);}
.gl-marks{position:absolute;top:0;left:0;width:100%;height:100%;
display:flex;align-items:center;justify-content:space-evenly;pointer-events:none;}
.gl-marks i{display:block;width:2px;height:12px;background:#0006;border-radius:1px;}
.gl-labels{display:flex;justify-content:space-between;margin-top:2px;padding:0 4px;}
.gl-labels span{font-size:7px;color:var(--dim);}
.invest-btn{padding:7px 12px;border-radius:8px;border:none;font-size:11px;font-weight:800;
cursor:pointer;background:linear-gradient(135deg,#6020c0,#4010a0);color:#d090ff;
white-space:nowrap;display:flex;align-items:center;gap:4px;transition:.1s;}
.invest-btn:disabled{opacity:0.35;cursor:default;}
.invest-btn:active:not(:disabled){transform:scale(0.95);}

/* ---- MODAL OVERLAY ---- */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#000c;
display:none;align-items:center;justify-content:center;z-index:100;padding:20px;}
.modal-overlay.show{display:flex;}
.modal-box{background:#1a1d3a;border-radius:16px;padding:16px;width:100%;max-width:380px;
border:1px solid var(--border);max-height:80vh;overflow-y:auto;}
.modal-box h3{font-size:14px;font-weight:800;margin-bottom:10px;text-align:center;}
.modal-mgr-item{display:flex;align-items:center;gap:10px;padding:10px;
background:var(--card);border-radius:10px;margin-bottom:6px;cursor:pointer;
border:1.5px solid var(--border);transition:.15s;}
.modal-mgr-item:active{transform:scale(0.97);}
.modal-mgr-item:hover{border-color:var(--green);}
.modal-mgr-portrait{width:48px;height:48px;border-radius:10px;border:2.5px solid #fff;
display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.modal-mgr-info{flex:1;display:flex;flex-direction:column;gap:2px;}
.modal-mgr-info .rname{font-size:12px;font-weight:800;}
.modal-mgr-info .rstat{font-size:10px;color:var(--dim);}
.modal-mgr-info .rdesc{font-size:9px;color:var(--dim);line-height:1.3;margin-top:2px;}
.modal-empty{text-align:center;color:var(--dim);font-size:12px;padding:20px 0;}
.modal-close{width:100%;padding:10px;border-radius:8px;border:none;font-size:12px;
font-weight:700;cursor:pointer;background:#2a1515;color:var(--red);margin-top:4px;}
.modal-close:active{background:#3a2020;}

/* ---- AD OVERLAY ---- */
.ad-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#000d;
display:flex;align-items:center;justify-content:center;z-index:200;flex-direction:column;}
.ad-box{background:#1a1a1a;border-radius:20px;padding:50px 70px;text-align:center;border:1px solid #333;}
.ad-box .timer{font-size:56px;font-weight:900;color:#fff;}
.ad-box .label{font-size:13px;color:#666;margin-top:10px;text-transform:uppercase;letter-spacing:2px;}

/* ---- FLOAT NUMBERS ---- */
.float-num{position:fixed;pointer-events:none;font-size:16px;font-weight:800;
color:var(--green);z-index:50;animation:floatUp 1s forwards;text-shadow:0 0 6px #3dd66a66;}
@keyframes floatUp{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-40px);}}


</style>
</head>
<body>

<!-- TOP BAR (fixed) -->
<div class="top-bar">
<div class="currency"><div class="cur-icon ci-soft">$</div><span id="softD">0</span></div>
<div style="text-align:center;">
<div class="game-title">💰 Бизнес Империя</div>
<div style="font-size:8px;color:var(--green);font-weight:600;" id="totalInc">+$0/сек</div>
</div>
<div class="currency"><div class="cur-icon ci-hard">💎</div><span id="hardD">150</span></div>
</div>

<!-- SCROLLABLE CONTENT -->
<div class="scroll-wrap" id="scrollWrap">

<!-- MANAGER SECTION -->
<div class="mgr-section">
<h3>👔 Менеджеры</h3>
<div class="mgr-slots" id="mgrSlots"></div>
</div>

<!-- TABS -->
<div class="tabs" id="tabs"></div>

<!-- BUSINESS GRID -->
<div class="biz-grid" id="bizGrid"></div>

<!-- DETAIL -->
<div class="detail" id="detail">
<div style="text-align:center;color:var(--dim);font-size:11px;padding:12px 0;">
👆 Нажмите на бизнес для просмотра деталей
</div>
</div>

</div><!-- /scroll-wrap -->

<!-- GLOBAL ECONOMY (fixed bottom) -->
<div class="global">
<h3>🌐 Глобальная экономика</h3>
<div class="gl-row">
<div style="flex:1;">
<div class="gl-track">
<div class="gl-fill" id="glFill" style="width:0%"></div>
<div class="gl-marks"><i></i><i></i><i></i><i></i></div>
</div>
<div class="gl-labels">
<span>+5%</span><span>+10%</span><span>+15%</span><span>+20%</span><span>+25%</span>
</div>
</div>
<button class="invest-btn" id="investBtn" onclick="doInvest()">
<span id="investCost">10</span>💎
</button>
</div>
</div>

<!-- MANAGER PICK MODAL -->
<div class="modal-overlay" id="mgrModal">
<div class="modal-box">
<h3>👔 Выберите менеджера</h3>
<div id="mgrModalList"></div>
<button class="modal-close" onclick="closeMgrModal()">Отмена</button>
</div>
</div>

<!-- AD OVERLAY -->
<div class="ad-overlay" id="adOvl" style="display:none;">
<div class="ad-box">
<div class="label">РЕКЛАМА</div>
<div class="timer" id="adT">3</div>
</div>
</div>

<script>
// ==================== STATE ====================
let soft = 100, hard = 150, gLvl = 0;
const G_COSTS = [10,20,30,40,50];
let selBiz = null, curTab = 0;
let mgrSlots = [null,null,null];
let searchCount = 0, nextRar = 0, faceIdx = 0;
let pickBizId = null; // which biz is picking a manager

const RAR = ['white','green','blue','purple','orange'];
const RAR_NAME = {white:'Обычный',green:'Необычный',blue:'Редкий',purple:'Эпический',orange:'Легендарный'};
const RAR_CLR = {white:'#bbb',green:'#3dd66a',blue:'#4a9eff',purple:'#a840ff',orange:'#ff8c1a'};
const FACES = ['👨‍💼','👩‍💼','🧔','👩‍🦰','🧑‍💼','👨‍🦳','👩‍🦱','🧑‍🔧','👨‍🍳','👩‍🔬',
'🧑‍💻','👨‍🏫','👩‍⚕️','🧑‍🎨','👨‍🚀','👩‍🌾','🧑‍🍳','👨‍🔧','👩‍💻','🧑‍⚕️'];

// Full stat descriptions for expanded view
const STAT_FULL = {
'inc5':'Увеличивает доход этого бизнеса на 5%',
'off5':'Увеличивает офлайн-доход этого бизнеса на 5%',
'inc20':'Увеличивает доход этого бизнеса на 20%',
'cost50':'Снижает стоимость улучшений этого бизнеса на 50%',
'offcap20':'Увеличивает лимит офлайн-накоплений на 20%',
'solo100':'Удваивает доход, если другие бизнесы в категории без менеджеров',
'full30':'Увеличивает доход на 30%, если вся категория прокачана до макс.',
'step1':'Даёт +1% дохода за каждый шаг прокачки любого бизнеса в категории',
'dbl2':'Удваивает эффект менеджеров двух ближайших соседей в категории'
};

const CATS = [
{name:'Еда',icon:'🍽️',biz:[
{n:'Ресторан',ic:'🍝',base:2},{n:'Кафе',ic:'☕',base:1.5},{n:'Пекарня',ic:'🥐',base:1.2},{n:'Суши-бар',ic:'🍣',base:2.5}]},
{name:'Технологии',icon:'💻',biz:[
{n:'IT-студия',ic:'🖥️',base:3},{n:'Ремонт техники',ic:'🔧',base:2},{n:'Веб-агентство',ic:'🌐',base:3.5},{n:'Геймдев',ic:'🎮',base:4}]},
{name:'Красота',icon:'💄',biz:[
{n:'Салон красоты',ic:'💇',base:1.8},{n:'Фитнес-клуб',ic:'🏋️',base:2.2},{n:'Спа-центр',ic:'🧖',base:2.8},{n:'Барбершоп',ic:'✂️',base:1.5}]},
{name:'Транспорт',icon:'🚗',biz:[
{n:'Автомойка',ic:'🚿',base:1},{n:'Такси-парк',ic:'🚕',base:2.5},{n:'Автосервис',ic:'🔩',base:3},{n:'Логистика',ic:'🚛',base:4.5}]},
{name:'Развлечения',icon:'🎭',biz:[
{n:'Кинотеатр',ic:'🎬',base:3},{n:'Клуб',ic:'🎶',base:3.5},{n:'Квест-рум',ic:'🔑',base:2},{n:'Аркада',ic:'🕹️',base:2.5}]}
];
const UPG_NAMES = ['Нанять персонал','Арендовать помещение','Найти поставщиков','Настроить логистику','Закупить оборудование'];

let BIZ = [];
let idx = 0;
CATS.forEach((c,ci) => c.biz.forEach(b => {
BIZ.push({id:idx++, name:b.n, icon:b.ic, catIdx:ci, base:b.base,
tier:1, ups:[false,false,false,false,false], upCnt:0,
mgr:null, cTimer:0, cReady:false,
tTimer:0, tActive:false, tDone:false, maxed:false});
}));

const COLLECT_TIME = 15;

// ==================== MANAGERS ====================
function genMgr(){
const r = RAR[nextRar % 5]; nextRar++;
const f = FACES[faceIdx % FACES.length]; faceIdx++;
let stat=null, desc='';
if(r==='green'){
if(Math.random()<0.5){stat='inc5';desc='+5% доход';}
else{stat='off5';desc='+5% офлайн';}
}else if(r==='blue'){
if(Math.random()<0.5){stat='inc20';desc='+20% доход';}
else{stat='cost50';desc='-50% цена улучш.';}
}else if(r==='purple'){
if(Math.random()<0.5){stat='offcap20';desc='+20% офлайн-кап';}
else{stat='solo100';desc='+100% если соло';}
}else if(r==='orange'){
const x=Math.random();
if(x<0.33){stat='full30';desc='+30% макс. кат.';}
else if(x<0.66){stat='step1';desc='+1%/шаг кат.';}
else{stat='dbl2';desc='×2 соседям';}
}
return{face:f,rarity:r,stat,desc};
}

function upgCost(b){
const base = 3 + b.id * 2;
const tm = Math.pow(1.8, b.tier-1);
const sm = 1 + b.upCnt * 0.4;
let c = Math.floor(base * tm * sm);
if(b.mgr && b.mgr.stat==='cost50') c = Math.floor(c*0.5);
return Math.max(1,c);
}

function effIncome(b){
let inc = b.base;
inc *= (1 + (b.tier-1)*1.5);
inc *= (1 + b.upCnt * 0.15);
inc *= (1 + gLvl * 0.05);
if(b.mgr){
const m=b.mgr;
if(m.stat==='inc5') inc*=1.05;
if(m.stat==='inc20') inc*=1.2;
if(m.stat==='solo100'){
const others=BIZ.filter(x=>x.catIdx===b.catIdx&&x.id!==b.id);
if(others.every(x=>!x.mgr)) inc*=2;
}
if(m.stat==='full30'){
if(BIZ.filter(x=>x.catIdx===b.catIdx).every(x=>x.maxed)) inc*=1.3;
}
if(m.stat==='step1'){
let steps=0;
BIZ.filter(x=>x.catIdx===b.catIdx).forEach(x=>{steps+=x.upCnt+(x.tier-1)*5;});
inc*=(1+steps*0.01);
}
}
const catB=BIZ.filter(x=>x.catIdx===b.catIdx);
const myCI=catB.findIndex(x=>x.id===b.id);
catB.forEach((cb,ci)=>{
if(cb.mgr&&cb.mgr.stat==='dbl2'&&cb.id!==b.id){
if(Math.abs(ci-myCI)<=1 && b.mgr){
if(b.mgr.stat==='inc5') inc*=1.05;
if(b.mgr.stat==='inc20') inc*=1.2;
}
}
});
return inc;
}

// ==================== AD ====================
let adCB=null;
function showAd(cb){
adCB=cb;
document.getElementById('adOvl').style.display='flex';
let t=3;
document.getElementById('adT').textContent=t;
const iv=setInterval(()=>{
t--;document.getElementById('adT').textContent=t;
if(t<=0){clearInterval(iv);document.getElementById('adOvl').style.display='none';
if(adCB)adCB();adCB=null;}
},1000);
}

// ==================== MANAGER PICK MODAL ====================
function openMgrModal(bizId){
pickBizId = bizId;
const avail = mgrSlots.filter(m=>m!==null);
const listEl = document.getElementById('mgrModalList');
listEl.innerHTML = '';
if(avail.length === 0){
listEl.innerHTML = '<div class="modal-empty">Нет доступных менеджеров.<br>Найдите менеджеров в разделе выше.</div>';
} else {
mgrSlots.forEach((m,i) => {
if(!m) return;
const fullDesc = m.stat ? STAT_FULL[m.stat] : 'Нет особых способностей';
const item = document.createElement('div');
item.className = 'modal-mgr-item';
item.onclick = () => assignMgrFromModal(i, bizId);
item.innerHTML = `
<div class="modal-mgr-portrait r-${m.rarity} rbg-${m.rarity}">${m.face}</div>
<div class="modal-mgr-info">
<div class="rname" style="color:${RAR_CLR[m.rarity]}">${RAR_NAME[m.rarity]}</div>
${m.desc ? `<div class="rstat">${m.desc}</div>` : ''}
<div class="rdesc">${fullDesc}</div>
</div>`;
listEl.appendChild(item);
});
}
document.getElementById('mgrModal').classList.add('show');
}

function closeMgrModal(){
pickBizId = null;
document.getElementById('mgrModal').classList.remove('show');
}

function assignMgrFromModal(slotIdx, bizId){
const b = BIZ[bizId];
if(b.mgr) return;
b.mgr = mgrSlots[slotIdx];
mgrSlots[slotIdx] = null;
closeMgrModal();
render();
}

// ==================== ACTIONS ====================
function searchMgr(si){
if(mgrSlots[si])return;
if(searchCount===0){
mgrSlots[si]=genMgr();searchCount++;renderMgr();
}else{
showAd(()=>{if(!mgrSlots[si]){mgrSlots[si]=genMgr();searchCount++;renderMgr();}});
}
}
function fireSlot(i){mgrSlots[i]=null;renderMgr();}

function swapMgr(bizId){
const b=BIZ[bizId];if(!b.mgr)return;
const fi=mgrSlots.findIndex(s=>s===null);if(fi===-1)return;
mgrSlots[fi]=b.mgr;b.mgr=null;render();
}
function dismissMgr(bizId){BIZ[bizId].mgr=null;render();}

function collectInc(bizId){
const b=BIZ[bizId];
if(b.mgr)return;
if(b.cReady){
const inc=effIncome(b)*COLLECT_TIME;
soft+=inc;b.cTimer=0;b.cReady=false;
spawnFloat('+$'+fmtN(inc));
render();
}
}

function onBizMgrClick(bizId){
const b = BIZ[bizId];
if(b.mgr) return;
const avail = mgrSlots.filter(m=>m!==null);
if(avail.length === 0) return;
openMgrModal(bizId);
}

function buyUpg(bizId){
const b=BIZ[bizId];
if(b.upCnt>=5||b.maxed)return;
const c=upgCost(b);if(soft<c)return;
soft-=c;
for(let i=0;i<5;i++){if(!b.ups[i]){b.ups[i]=true;b.upCnt++;break;}}
if(b.upCnt>=5 && b.tier<4){
b.tActive=true;b.tTimer=30;b.tDone=false;
}else if(b.upCnt>=5 && b.tier>=4){
b.maxed=true;
}
render();
}

function skipTimer(bizId){
showAd(()=>{BIZ[bizId].tActive=false;BIZ[bizId].tDone=true;BIZ[bizId].tTimer=0;renderDetail();});
}

function expandBiz(bizId){
const b=BIZ[bizId];if(b.tier>=4)return;
b.tier++;b.ups=[false,false,false,false,false];b.upCnt=0;
b.tActive=false;b.tDone=false;b.tTimer=0;
render();
}

function doInvest(){
if(gLvl>=5)return;
const c=G_COSTS[gLvl];if(hard<c)return;
hard-=c;gLvl++;render();
}

function spawnFloat(txt){
const el=document.createElement('div');
el.className='float-num';el.textContent=txt;
el.style.left='50%';el.style.top='45%';el.style.transform='translateX(-50%)';
document.body.appendChild(el);
setTimeout(()=>el.remove(),1000);
}

function fmtN(n){
if(n>=1e9)return(n/1e9).toFixed(1)+'B';
if(n>=1e6)return(n/1e6).toFixed(1)+'M';
if(n>=1e3)return(n/1e3).toFixed(1)+'K';
return Math.floor(n).toString();
}

// ==================== RENDER ====================
function render(){
document.getElementById('softD').textContent=fmtN(soft);
document.getElementById('hardD').textContent=hard;
let totalAuto=0;
BIZ.forEach(b=>{if(b.mgr)totalAuto+=effIncome(b);});
document.getElementById('totalInc').textContent='+$'+fmtN(totalAuto)+'/сек';
renderMgr();renderTabs();renderBiz();renderDetail();renderGlobal();
}

function renderMgr(){
const c=document.getElementById('mgrSlots');c.innerHTML='';
mgrSlots.forEach((m,i)=>{
const s=document.createElement('div');s.className='mgr-slot';
if(!m){
const free=searchCount===0;
s.innerHTML=`<div class="slot-search" onclick="searchMgr(${i})">
<div class="ico">🔍</div><div class="txt">Искать</div>
<div class="sub">${free?'Бесплатно':'📺 Реклама'}</div></div>`;
}else{
s.innerHTML=`<div class="mgr-card-inner">
<div class="mgr-portrait r-${m.rarity} rbg-${m.rarity}">${m.face}</div>
<div class="mgr-right">
<div class="mgr-rarity-label" style="color:${RAR_CLR[m.rarity]}">${RAR_NAME[m.rarity]}</div>
${m.desc?`<div class="mgr-stat-label">${m.desc}</div>`:''}
<div class="mgr-btns">
<button class="mb-fire" onclick="event.stopPropagation();fireSlot(${i})">Отказать 👎</button>
</div></div></div>`;
}
c.appendChild(s);
});
}

function renderTabs(){
const c=document.getElementById('tabs');c.innerHTML='';
CATS.forEach((cat,i)=>{
const t=document.createElement('div');
t.className='tab'+(i===curTab?' on':'');
t.textContent=cat.icon+' '+cat.name;
t.onclick=()=>{curTab=i;selBiz=null;render();};
c.appendChild(t);
});
}

function renderBiz(){
const c=document.getElementById('bizGrid');c.innerHTML='';
const list=BIZ.filter(b=>b.catIdx===curTab);
list.forEach(b=>{
const d=document.createElement('div');
d.className='biz'+(selBiz===b.id?' sel':'');
d.onclick=()=>{selBiz=b.id;renderBiz();renderDetail();};
const inc=effIncome(b);
const hasMgr=!!b.mgr;

const tierL=b.maxed?'⭐MAX':`T${b.tier}/4 · ${b.upCnt}/5`;

if(hasMgr){
const m=b.mgr;
const fullDesc = m.stat ? STAT_FULL[m.stat] : 'Без особых способностей';
const hasFree=mgrSlots.some(s=>s===null);
const btnHtml = hasFree
? `<div class="rbtn" style="background:#121e3a;color:var(--blue);" onclick="event.stopPropagation();swapMgr(${b.id})">Сменить</div>`
: `<div class="rbtn" style="background:#2a1212;color:var(--red);" onclick="event.stopPropagation();dismissMgr(${b.id})">Уволить</div>`;

d.innerHTML=`<div class="biz-ico">${b.icon}</div>
<div class="biz-mid compact">
<div class="biz-cat">${CATS[b.catIdx].name}</div>
<div class="biz-name">${b.name}</div>
<div class="biz-inc">$${inc.toFixed(1)}/с</div>
<div class="biz-tier">${tierL}</div>
</div>
<div class="biz-mgr-portrait r-${m.rarity} rbg-${m.rarity}">${m.face}</div>
<div class="biz-mgr-desc">
<div class="rname" style="color:${RAR_CLR[m.rarity]}">${RAR_NAME[m.rarity]}</div>
<div class="rstat" style="color:${RAR_CLR[m.rarity]}">${m.desc||'—'}</div>
<div class="rdesc">${fullDesc}</div>
${btnHtml}
</div>`;
}else{
const pct=b.cTimer/COLLECT_TIME;
const ang=pct*360;
const ready=b.cReady;
const hasAvail=mgrSlots.some(s=>s!==null);
const grad=ready?'background:#1a4030;':'background:conic-gradient(var(--blue) '+ang+'deg, #1e2148 '+ang+'deg);';
const cls=ready?'collect-ring collect-ready':'collect-ring';
let inner, clickFn;
if(ready){
inner='<span style="font-size:12px;font-weight:800;color:var(--green);">$$$</span>';
clickFn=`collectInc(${b.id})`;
}else if(hasAvail){
inner='<span style="font-size:14px;color:var(--green);">👤+</span>';
clickFn=`onBizMgrClick(${b.id})`;
}else{
inner='<span style="font-size:18px;color:#4a5080;">+</span>';
clickFn='';
}

d.innerHTML=`<div class="biz-ico">${b.icon}</div>
<div class="biz-mid expand">
<div class="biz-cat">${CATS[b.catIdx].name}</div>
<div class="biz-name">${b.name}</div>
<div class="biz-inc">$${inc.toFixed(1)}/сек</div>
<div class="biz-tier">${tierL}</div>
</div>
<div class="${cls}" style="${grad}border-radius:9px;" onclick="event.stopPropagation();${clickFn}">
<div class="collect-inner">${inner}</div></div>`;
}
c.appendChild(d);
});
}

function renderDetail(){
const c=document.getElementById('detail');
if(selBiz===null){
c.innerHTML='<div style="text-align:center;color:var(--dim);font-size:11px;padding:12px 0;">👆 Нажмите на бизнес</div>';return;}
const b=BIZ[selBiz];
const cost=upgCost(b);
const inc=effIncome(b);

let uHTML='';
UPG_NAMES.forEach((n,i)=>{
uHTML+=`<div class="upg"><span>${n}</span><div class="chk${b.ups[i]?' on':''}">${b.ups[i]?'✓':''}</div></div>`;
});

let actHTML='';
if(b.maxed){
actHTML=`<button class="act-btn ab-max" disabled>⭐ Бизнес на максимуме!</button>`;
}else if(b.upCnt<5){
const can=soft>=cost;
actHTML=`<button class="act-btn ab-buy" ${can?'':`style="opacity:0.45;"`}
onclick="buyUpg(${b.id})">Купить улучшение — $${cost}</button>`;
}else if(b.tActive&&!b.tDone){
const rem=Math.max(0,Math.ceil(b.tTimer));
const mm=Math.floor(rem/60),ss=rem%60;
actHTML=`<div class="timer-row">⏳ Расширение через ${mm}:${ss.toString().padStart(2,'0')}</div>
<button class="act-btn ab-ad" onclick="skipTimer(${b.id})">📺 Пропустить за рекламу</button>`;
}else if(b.tDone){
actHTML=`<button class="act-btn ab-expand" onclick="expandBiz(${b.id})">🚀 Расширение → Тир ${b.tier+1}</button>`;
}else{
actHTML=`<button class="act-btn ab-wait" disabled>Все улучшения куплены…</button>`;
}

const tierL=b.maxed?'⭐ МАКС':`Тир ${b.tier}/4`;
c.innerHTML=`<h3>${b.icon} ${b.name} — ${tierL}</h3>
<div class="inc">Доход: $${inc.toFixed(2)}/сек ${b.mgr?'(авто)':'(ручной сбор)'}</div>
<div class="upg-list">${uHTML}</div>${actHTML}`;
}

function renderGlobal(){
const pct=(gLvl/5)*100;
document.getElementById('glFill').style.width=pct+'%';
const btn=document.getElementById('investBtn');
if(gLvl>=5){btn.disabled=true;btn.innerHTML='✓ Макс';}
else{const c=G_COSTS[gLvl];btn.disabled=hard<c;
btn.innerHTML=`<span>${c}</span>💎`;}
}

// ==================== GAME LOOP ====================
let last=Date.now();
function loop(){
const now=Date.now();const dt=(now-last)/1000;last=now;
BIZ.forEach(b=>{
const inc=effIncome(b);
if(b.mgr){soft+=inc*dt;}
else{if(!b.cReady){b.cTimer+=dt;if(b.cTimer>=COLLECT_TIME){b.cTimer=COLLECT_TIME;b.cReady=true;}}}
if(b.tActive&&!b.tDone){b.tTimer-=dt;if(b.tTimer<=0){b.tTimer=0;b.tActive=false;b.tDone=true;}}
});
document.getElementById('softD').textContent=fmtN(soft);
document.getElementById('hardD').textContent=hard;
requestAnimationFrame(loop);
}

setInterval(()=>{renderBiz();if(selBiz!==null)renderDetail();renderGlobal();},500);

// ==================== INIT ====================
render();
loop();
</script>
</body>
</html>
